apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dummysites.dwk.cirenandre.com
spec:
  group: dwk.cirenandre.com
  scope: Namespaced
  names:
    plural: dummysites
    singular: dummysite
    kind: DummySite
    listKind: DummySiteList
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["website_url"]
              properties:
                website_url:
                  type: string
      additionalPrinterColumns:
        - name: Website
          type: string
          jsonPath: .spec.website_url

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment-1-1
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app-container
          image: task11:latest
          imagePullPolicy: Never
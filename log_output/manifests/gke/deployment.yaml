apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-app
  labels:
    app: log-output-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output-app
  template:
    metadata:
      labels:
        app: log-output-app
    spec:
      volumes:
        - name: shared-log-volume
          persistentVolumeClaim:
            claimName: log-output-pvc
        - name: config-volume
          configMap:
            name: log-output-config
      containers:
        - name: app-reader
          image: cirenandre/log_output:reader-1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: log-output-config
                  key: MESSAGE
          volumeMounts:
            - name: shared-log-volume
              mountPath: /usr/src/app/files
            - name: config-volume
              mountPath: /usr/src/app/config
        - name: app-writer
          image: cirenandre/log_output:writer-1.0
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: shared-log-volume
              mountPath: /usr/src/app/files

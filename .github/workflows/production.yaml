name: Release project to production

on:
  push:
    tags:
      - 'prod-*'

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  REGISTRY: europe-north1-docker.pkg.dev
  REPOSITORY: dwk-repo
  TAG: ${{ github.ref_name }}

jobs:
  build-publish:
    name: Build, Push, Release to production
    runs-on: ubuntu-latest
    environment: GKE_PROJECT

    steps:
      # Check out main (not the tag) so the manifest-update commit lands
      # on a real branch — tags are immutable, you can't commit to one.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v3

      - run: gcloud --quiet auth configure-docker $REGISTRY

      # tag images with the git tag to get a unique, traceable tag
      - name: 'Form the image names'
        run: |
          echo "IMAGE_TAG_APP=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-app:$TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG_BACKEND=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-backend:$TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG_CRON=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-cron:$TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG_BROADCASTER=$REGISTRY/$PROJECT_ID/$REPOSITORY/broadcaster:$TAG" >> $GITHUB_ENV

      - name: Build todo-app
        run: docker build --tag $IMAGE_TAG_APP ./todo-app

      - name: Build todo-backend
        run: docker build --tag $IMAGE_TAG_BACKEND ./todo-backend

      - name: Build todo-cron
        run: docker build --tag $IMAGE_TAG_CRON ./todo-cron

      - name: Build broadcaster
        run: docker build --tag $IMAGE_TAG_BROADCASTER ./broadcaster

      - name: Publish todo-app
        run: docker push $IMAGE_TAG_APP

      - name: Publish todo-backend
        run: docker push $IMAGE_TAG_BACKEND

      - name: Publish todo-cron
        run: docker push $IMAGE_TAG_CRON

      - name: Publish broadcaster
        run: docker push $IMAGE_TAG_BROADCASTER

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      # Tags are immutable, so the manifest update commits to main instead
      # of the tag itself. ArgoCD's production Application watches this
      # path on main and syncs the production namespace automatically.
      - name: Update image tags for GitOps
        working-directory: project/manifests/overlays/production
        run: |-
          kustomize edit set image todo-app=$IMAGE_TAG_APP
          kustomize edit set image todo-backend-app=$IMAGE_TAG_BACKEND
          kustomize edit set image todo-cron=$IMAGE_TAG_CRON
          kustomize edit set image broadcaster=$IMAGE_TAG_BROADCASTER

      - name: Commit kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v10
        with:
          add: 'project/manifests/overlays/production/kustomization.yaml'
          message: "New production version released ${{ github.ref_name }}"

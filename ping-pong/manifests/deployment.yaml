apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-app
  labels:
    app: ping-pong-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong-app
  template:
    metadata:
      labels:
        app: ping-pong-app
    spec:
      volumes:
        - name: shared-log-volume
          persistentVolumeClaim:
            claimName: log-output-pvc
      containers:
        - name: ping-pong-app
          image: ping-pong-app:1.1
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: shared-log-volume
              mountPath: /usr/src/app/files
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-app
  namespace: exercises
  labels:
    app: ping-pong-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong-app
  template:
    metadata:
      labels:
        app: ping-pong-app
    spec:
      containers:
        - name: ping-pong-app
          image: ping-pong-app:1.3
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: ping-pong-config
            - secretRef:
                name: postgres-secret

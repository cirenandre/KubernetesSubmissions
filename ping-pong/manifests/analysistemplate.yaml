apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: cpu-usage
  namespace: exercises
spec:
  metrics:
    - name: cpu-usage
      initialDelay: 5m
      interval: 30s
      count: 5
      failureLimit: 1
      successCondition: result < 0.2
      provider:
        prometheus:
          address: http://prom-prometheus-server.monitoring.svc.cluster.local
          query: |
            scalar(sum(rate(container_cpu_usage_seconds_total{namespace="exercises"}[5m])))

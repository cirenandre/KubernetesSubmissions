apiVersion: batch/v1
kind: CronJob
metadata:
  name: todo-backup
  labels:
    app: todo-backup
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: todo-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: todo-backup-ksa
          containers:
            - name: todo-backup
              image: todo-backup
              imagePullPolicy: IfNotPresent
              env:
                - name: POSTGRES_HOST
                  value: todo-postgres-svc
                - name: BUCKET_NAME
                  value: dwk-gke-502909-todo-backups
              envFrom:
                - configMapRef:
                    name: todo-backend-config
                - secretRef:
                    name: postgres-secret

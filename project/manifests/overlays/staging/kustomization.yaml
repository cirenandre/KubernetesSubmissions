  - name: todo-backend-app
    newName: europe-north1-docker.pkg.dev/dwk-gke-502909/dwk-repo/todo-backend
    newTag: "1.0"
  - name: todo-cron
    newName: europe-north1-docker.pkg.dev/dwk-gke-502909/dwk-repo/todo-cron
    newTag: "1.0"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: project

resources:
  - ../../base
  - todo-app-pv.yaml

patches:
  - path: patch-todo-app-pvc.yaml
  - path: patch-todo-app-ingress.yaml

images:
  - name: todo-app
    newTag: "1.5"
  - name: todo-backend-app
    newTag: "1.6"
  - name: todo-cron
    newTag: "1.0"
